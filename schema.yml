openapi: 3.0.3
info:
  title: Hospital Management API
  version: 1.0.0
  description: Backend API for Hospital Management System
paths:
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: |2

        Returns the profile information of the currently authenticated user.

        Requires a valid JWT access token.

        Returns:
        - id
        - username
        - email
        - role
      summary: Get authenticated user's profile
      tags:
      - Accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/hospital/appointments/:
    get:
      operationId: hospital_appointments_list
      description: |2

        Retrieve appointments visible to the authenticated user.

        Permissions:

        - Admin → All appointments
        - Doctor → Assigned appointments
        - Nurse → Assigned appointments
        - Patient → Own appointments

        Patients can also create new appointments.
      summary: List or create appointments
      tags:
      - Appointments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
          description: ''
    post:
      operationId: hospital_appointments_create
      description: |2

        Retrieve appointments visible to the authenticated user.

        Permissions:

        - Admin → All appointments
        - Doctor → Assigned appointments
        - Nurse → Assigned appointments
        - Patient → Own appointments

        Patients can also create new appointments.
      summary: List or create appointments
      tags:
      - Appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Appointment'
            examples:
              CreateAppointment:
                value:
                  doctor: 1
                  nurse: 1
                  appointment_date: '2026-07-01T10:00:00Z'
                summary: Create Appointment
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Appointment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Appointment'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/hospital/appointments/{id}/:
    get:
      operationId: hospital_appointments_retrieve
      description: |2

        Only the assigned doctor can update an appointment.

        When the status changes from **PENDING** to **COMPLETED**, a Medical Record
        is automatically created (if one does not already exist).
      summary: Update appointment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Appointments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
    put:
      operationId: hospital_appointments_update
      description: |2

        Only the assigned doctor can update an appointment.

        When the status changes from **PENDING** to **COMPLETED**, a Medical Record
        is automatically created (if one does not already exist).
      summary: Update appointment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Appointment'
            examples:
              CompleteAppointment:
                value:
                  status: COMPLETED
                  diagnosis: Seasonal Flu
                  notes: Rest, fluids and medication.
                summary: Complete Appointment
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Appointment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Appointment'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
    patch:
      operationId: hospital_appointments_partial_update
      description: |2

        Only the assigned doctor can update an appointment.

        When the status changes from **PENDING** to **COMPLETED**, a Medical Record
        is automatically created (if one does not already exist).
      summary: Update appointment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAppointment'
            examples:
              CompleteAppointment:
                value:
                  status: COMPLETED
                  diagnosis: Seasonal Flu
                  notes: Rest, fluids and medication.
                summary: Complete Appointment
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAppointment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAppointment'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/records/:
    get:
      operationId: records_list
      description: |2

        Retrieve medical records according to the authenticated user's role.

        Permissions:

        - Admin → All medical records
        - Doctor → Records of assigned patients
        - Nurse → Records of assigned patients
        - Patient → Own medical records
      summary: List medical records
      tags:
      - Medical Records
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedicalRecord'
          description: ''
  /api/records/{id}/:
    get:
      operationId: records_retrieve
      description: |2

        Retrieve a single medical record.

        The authenticated user must have permission to access the requested record.
      summary: Retrieve medical record
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Medical Records
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          description: |-
            Current appointment status.

            * `PENDING` - Pending
            * `COMPLETED` - Completed
            * `CANCELLED` - Cancelled
        appointment_date:
          type: string
          format: date-time
        diagnosis:
          type: string
        notes:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        patient:
          type: integer
          readOnly: true
        doctor:
          type: integer
        nurse:
          type: integer
          nullable: true
      required:
      - appointment_date
      - doctor
      - id
      - patient
      - status
    MedicalRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        diagnosis:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        patient:
          type: integer
        appointment:
          type: integer
      required:
      - appointment
      - created_at
      - diagnosis
      - id
      - patient
    PatchedAppointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          description: |-
            Current appointment status.

            * `PENDING` - Pending
            * `COMPLETED` - Completed
            * `CANCELLED` - Cancelled
        appointment_date:
          type: string
          format: date-time
        diagnosis:
          type: string
        notes:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        patient:
          type: integer
          readOnly: true
        doctor:
          type: integer
        nurse:
          type: integer
          nullable: true
    RoleEnum:
      enum:
      - ADMIN
      - DOCTOR
      - NURSE
      - PATIENT
      type: string
      description: |-
        * `ADMIN` - Admin
        * `DOCTOR` - Doctor
        * `NURSE` - Nurse
        * `PATIENT` - Patient
    StatusEnum:
      enum:
      - PENDING
      - COMPLETED
      - CANCELLED
      type: string
      description: |-
        * `PENDING` - Pending
        * `COMPLETED` - Completed
        * `CANCELLED` - Cancelled
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - id
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
